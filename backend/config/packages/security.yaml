security:

    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Auth endpoints - no JWT required
        auth:
            pattern: ^/api/auth
            stateless: true
            security: false

        # Public API - no JWT required
        public:
            pattern: ^/api/trips
            stateless: true
            security: false
        
        public_cat:
            pattern: ^/api/categories
            stateless: true
            security: false
            
        public_dest:
            pattern: ^/api/destinations
            stateless: true
            security: false
            
        public_rec:
            pattern: ^/api/recommendations
            stateless: true
            security: false
            
        public_ai:
            pattern: ^/api/ai
            stateless: true
            security: false
            
        public_rev:
            pattern: ^/api/reviews
            stateless: true
            security: false
            
        public_mom:
            pattern: ^/api/moments/trip
            stateless: true
            security: false
            
        public_my_book:
            pattern: ^/api/moments/my-bookings
            stateless: true
            security: false
            
        public_mom_root:
            pattern: ^/api/moments$
            stateless: true
            security: false

        # All other API - JWT authentication
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            provider: app_user_provider